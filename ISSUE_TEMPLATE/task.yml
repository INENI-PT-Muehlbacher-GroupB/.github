name: 📋 Task
description: Create a new task for the platform project
title: "[TASK]: "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for creating a new task! Please fill out the sections below to ensure clarity and traceability.

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this task needed? How does it fit into the overall platform?
      placeholder: |
        Briefly describe the background and motivation for this task.
        Reference related issues, epics, or pillars (e.g., Infrastructure Bootstrap).
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
      placeholder: |
        Provide a clear and concise description of the work to be performed.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define when this task is considered "done".
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Documentation updated
        - [ ] PR merged via squash
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tasks / Subtasks
      description: Break down the work into smaller actionable steps.
      placeholder: |
        - [ ] Step 1
        - [ ] Step 2
        - [ ] Step 3
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to documentation, related issues, or external resources.
      placeholder: |
        - Related issue: #123
        - Docs: https://...
    validations:
      required: false

  - type: dropdown
    id: pillar
    attributes:
      label: Grading Pillar
      description: Which grading pillar does this task contribute to?
      options:
        - Documentation & Software Management Hygiene
        - Infrastructure Bootstrap
        - Application Management
        - Presentation
        - Bonus
      default: 1
    validations:
      required: true
